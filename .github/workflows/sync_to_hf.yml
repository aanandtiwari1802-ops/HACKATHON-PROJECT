name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
  # Allow manual trigger
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "Error: HF_TOKEN secret is empty or not found. Please ensure you named it exactly HF_TOKEN in GitHub Secrets."
            exit 1
          fi
          git push --force https://AnandMatrix:$HF_TOKEN@huggingface.co/spaces/AnandMatrix/math-reasoning-env main
